name: WP Social Notes Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"  # runs every 30 minutes (optional)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo (required for git commit/push)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node (optional, useful if you later parse WP JSON)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Create Social Notes folder + sample data
      - name: Generate Social Notes
        run: |
          mkdir -p social-notes

          # Sample placeholder (replace later with WP API data)
          echo "Hello from WP Sync - $(date)" > social-notes/note.txt

          # Optional structured JSON format for Jetpack-style notes
          cat > social-notes/notes.json <<EOF
          [
            {
              "id": "test-1",
              "title": "Test Note",
              "content": "Hello from GitHub Actions sync",
              "date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            }
          ]
          EOF

      # 4. Commit changes safely
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add social-notes/

          # only commit if changes exist
          git diff --staged --quiet || git commit -m "WP Social Notes sync update"

      # 5. Push changes
      - name: Push to repository
        run: |
          git push
