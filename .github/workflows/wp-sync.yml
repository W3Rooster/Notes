name: WP Social Notes Sync

on:
workflow_dispatch:
inputs:
title:
description: "Note title"
required: true
type: string
content:
description: "Note content"
required: true
type: string
url:
description: "Source URL"
required: false
type: string

permissions:
contents: write

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Create Social Note file
    run: |
      mkdir -p social-notes

      DATE=$(date +%Y-%m-%d-%H%M%S)

      TITLE="${{ github.event.inputs.title }}"
      CONTENT="${{ github.event.inputs.content }}"
      URL="${{ github.event.inputs.url }}"

      SAFE_TITLE=$(echo "$TITLE" | tr ' ' '-' | tr -cd '[:alnum:]-_')

      FILENAME="social-notes/${DATE}-${SAFE_TITLE}.md"

      {
        echo "---"
        echo "title: \"$TITLE\""
        echo "date: \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\""
        echo "source_url: \"$URL\""
        echo "type: social-note"
        echo "---"
        echo ""
        echo "$CONTENT"
      } > "$FILENAME"

  - name: Commit and push changes
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      git add social-notes/

      git diff --staged --quiet || git commit -m "Add social note: ${{ github.event.inputs.title }}"

      git push
```
