name: WP Social Notes Sync

on:
  workflow_dispatch:
  repository_dispatch:
    types: [wp-social-notes-sync]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Show webhook payload (DEBUG)
        run: |
          echo "Event type: ${{ github.event.action }}"
          echo "Payload: ${{ toJson(github.event.client_payload) }}"

      - name: Create Social Notes from WP
        run: |
          mkdir -p social-notes

          TITLE="${{ github.event.client_payload.title }}"
          CONTENT="${{ github.event.client_payload.content }}"
          URL="${{ github.event.client_payload.url }}"
          ID="${{ github.event.client_payload.post_id }}"

          echo "Title: $TITLE" > social-notes/note.txt
          echo "Content: $CONTENT" >> social-notes/note.txt
          echo "URL: $URL" >> social-notes/note.txt

          cat > social-notes/notes.json <<EOF
          [
            {
              "id": "$ID",
              "title": "$TITLE",
              "content": "$CONTENT",
              "url": "$URL",
              "date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            }
          ]
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add social-notes/

          git diff --staged --quiet || git commit -m "WP webhook sync update"

      - name: Push changes
        run: |
          git push
