name: WP Social Notes Sync

on:
  workflow_dispatch:
  repository_dispatch:
    types: [wp-social-notes-sync]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create social note
        run: |
          mkdir -p social-notes

          echo "Triggered: $(date)" > social-notes/note.txt

          echo '{
            "status": "ok",
            "message": "workflow running"
          }' > social-notes/status.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add social-notes/

          git diff --staged --quiet || git commit -m "initial wp sync test"

      - name: Push changes
        run: |
          git push
