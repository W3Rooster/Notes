name: WP Social Notes Sync

on:
  workflow_dispatch:
  repository_dispatch:
    types: [wp-social-notes-sync]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Social Notes from trigger
        run: |
          mkdir -p social-notes

          echo "Triggered from WordPress webhook at $(date)" > social-notes/note.txt

          cat > social-notes/notes.json <<EOF
          [
            {
              "id": "wp-triggered",
              "title": "WP Triggered Note",
              "content": "This was triggered from WordPress webhook",
              "date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            }
          ]
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add social-notes/
          git diff --staged --quiet || git commit -m "WP webhook sync update"

      - name: Push changes
        run: |
          git push
